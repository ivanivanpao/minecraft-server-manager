<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft 伺服器管理工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 頂部列：品牌、語言、主題 -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">⛏️</span>
      <h1 data-i18n="app.title">Minecraft 伺服器管理工具</h1>
    </div>
    <div class="topbar-controls">
      <select id="lang-select" class="control" title="Language / 語言">
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
      <button id="btn-theme" class="icon-btn" title="切換主題">🌙</button>
    </div>
  </header>

  <main id="app">
    <div class="section-head">
      <h2 data-i18n="server.list_title">伺服器清單</h2>
      <button id="btn-add-server" class="btn primary" data-i18n="server.add">新增伺服器</button>
    </div>

    <!-- 所有伺服器以卡片顯示 -->
    <div id="server-grid" class="server-grid"></div>

    <!-- 沒有伺服器時的空狀態 -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <p data-i18n="server.empty">尚無伺服器，請按「新增伺服器」加入一台。</p>
    </div>

    <!-- 伺服器控制（第二階段）：對「目前操作中」的伺服器 start / stop / restart -->
    <section id="control-section" class="control-section hidden">
      <div class="control-bar">
        <div class="control-info">
          <span class="control-label" data-i18n="control.title">伺服器控制</span>
          <span id="control-server-name" class="control-server-name"></span>
          <span id="control-state" class="state-badge" data-kind="off"></span>
        </div>
        <div class="control-buttons">
          <button id="btn-start" class="btn" data-i18n-title="control.start_hint">
            ▶ <span data-i18n="control.start">啟動</span>
          </button>
          <button id="btn-stop" class="btn" data-i18n-title="control.stop_hint">
            ■ <span data-i18n="control.stop">停止</span>
          </button>
          <button id="btn-restart" class="btn" data-i18n-title="control.restart_hint">
            ⟳ <span data-i18n="control.restart">重啟</span>
          </button>
          <button id="btn-edit-config" class="btn" data-i18n-title="cfg.edit_hint">
            ⚙ <span data-i18n="cfg.edit">設定檔</span>
          </button>
        </div>
      </div>
    </section>

    <!-- 指令主控台（第四階段）：透過 RCON 對「目前操作中」伺服器送指令 -->
    <section id="command-section" class="command-section hidden">
      <div class="section-head">
        <h2>
          <span data-i18n="cmd.title">指令主控台</span>
          <span id="cmd-server-name" class="cmd-server-name"></span>
        </h2>
        <button id="cmd-clear" class="btn ghost sm" data-i18n="cmd.clear">清空</button>
      </div>
      <div id="cmd-output" class="cmd-output"></div>
      <div class="cmd-inputrow">
        <div class="cmd-input-wrap">
          <span class="cmd-prompt">/</span>
          <input type="text" id="cmd-input" class="cmd-input" autocomplete="off" spellcheck="false"
                 data-i18n-placeholder="cmd.placeholder" placeholder="輸入指令，例如 list、time set day">
          <ul id="cmd-suggest" class="cmd-suggest hidden"></ul>
        </div>
        <button id="cmd-send" class="btn primary" data-i18n="cmd.send">送出</button>
      </div>
      <p class="hint cmd-hint" data-i18n="cmd.hint">透過 RCON 送指令（不用加開頭斜線）；伺服器需執行中且已啟用 RCON。</p>
    </section>

    <!-- 即時 log（第一階段）：顯示「目前操作中」伺服器的容器 log -->
    <section id="log-section" class="log-section">
      <div class="section-head">
        <h2>
          <span data-i18n="log.title">即時 Log</span>
          <span id="log-server-name" class="log-server-name"></span>
        </h2>
        <div class="log-controls">
          <span id="log-status" class="log-status"></span>
          <label class="log-autoscroll" title="" data-i18n-title="log.autoscroll_hint">
            <input type="checkbox" id="log-autoscroll" checked>
            <span data-i18n="log.autoscroll">自動捲動</span>
          </label>
          <button id="log-clear" class="btn ghost sm" data-i18n="log.clear">清空</button>
        </div>
      </div>
      <div id="log-output" class="log-output" aria-live="polite">
        <div class="log-placeholder" data-i18n="log.placeholder">選擇一台伺服器以檢視即時 log。</div>
      </div>
    </section>
  </main>

  <!-- 新增伺服器 / 資料夾瀏覽器 對話框 -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 data-i18n="add.title">新增伺服器</h2>
      <p class="hint" data-i18n="add.hint">請選到該伺服器的 data 資料夾（內含 server.properties）。</p>

      <div class="fs-path" id="fs-current-path"></div>
      <ul class="fs-list" id="fs-list"></ul>

      <div id="detect-result" class="detect-result hidden"></div>

      <div class="modal-actions">
        <label id="display-name-row" class="field hidden">
          <span data-i18n="add.display_name">顯示暱稱</span>
          <input type="text" id="display-name" />
        </label>
        <span class="spacer"></span>
        <button id="btn-cancel" class="btn ghost" data-i18n="common.cancel">取消</button>
        <button id="btn-select-folder" class="btn" disabled data-i18n="add.select_this">選這個資料夾</button>
        <button id="btn-save-server" class="btn primary hidden" data-i18n="add.save">確認新增</button>
      </div>
    </div>
  </div>

  <!-- 設定檔編輯器（第三階段）：編輯選中伺服器的 server.properties -->
  <div id="config-modal" class="modal hidden">
    <div class="modal-box config-box">
      <div class="config-head">
        <h2>
          <span data-i18n="cfg.title">編輯 server.properties</span>
          <span id="config-server-name" class="config-server-name"></span>
        </h2>
        <button id="config-close-x" class="icon-btn" title="關閉">✕</button>
      </div>
      <div id="config-tabs" class="config-tabs">
        <button class="config-tab active" data-tab="properties" data-i18n="cfg.tab.properties">server.properties</button>
        <button class="config-tab" data-tab="ops" data-i18n="cfg.tab.ops">OP</button>
        <button class="config-tab" data-tab="whitelist" data-i18n="cfg.tab.whitelist">白名單</button>
        <button class="config-tab" data-tab="banned-players" data-i18n="cfg.tab.banned_players">封鎖玩家</button>
        <button class="config-tab" data-tab="banned-ips" data-i18n="cfg.tab.banned_ips">封鎖 IP</button>
      </div>
      <div id="config-toolbar" class="config-toolbar">
        <input type="text" id="config-filter" class="control" data-i18n-placeholder="cfg.filter"
               placeholder="搜尋設定項…">
      </div>
      <div id="config-body" class="config-body"></div>
      <div class="config-foot">
        <span id="config-note" class="hint" data-i18n="cfg.restart_note">多數變更需重啟伺服器才會生效。</span>
        <span id="config-dirty" class="config-dirty hidden" data-i18n="cfg.unsaved_badge">● 未儲存</span>
        <span class="spacer"></span>
        <button id="config-cancel" class="btn ghost" data-i18n="common.cancel">取消</button>
        <button id="config-save" class="btn primary" data-i18n="common.save">儲存</button>
      </div>
    </div>
  </div>

  <!-- server-select.js 為進入點，會 import i18n.js 與 theme.js -->
  <script type="module" src="js/server-select.js"></script>
</body>
</html>
